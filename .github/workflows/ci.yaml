name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Run format check
        run: bun run format:check

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Network diagnostic
        run: |
          echo "=== curl registry.npmjs.org ==="
          curl -sI -o /dev/null -w "registry: %{http_code} time=%{time_total}s\n" https://registry.npmjs.org/zod || echo "registry curl failed"
          curl -sI -o /dev/null -w "tarball: %{http_code} time=%{time_total}s\n" https://registry.npmjs.org/zod/-/zod-3.25.76.tgz || echo "tarball curl failed"
          echo "=== bun version ==="
          bun --version
          echo "=== resolved DNS ==="
          getent hosts registry.npmjs.org || echo "DNS resolution failed"

      - name: Install dependencies (serial)
        run: bun install --concurrent-scripts 1

      - name: Run tests
        run: bun test

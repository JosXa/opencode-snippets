name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# GitHub Actions ubuntu-24.04 runners advertise IPv6 connectivity via DNS
# (registry.npmjs.org has AAAA records) but the underlying network drops
# IPv6 egress. Bun's installer prefers IPv6 and stalls with
# FailedToOpenSocket / ConnectionRefused on every tarball, while curl
# transparently falls back to IPv4 (which is why the runner looks healthy
# in diagnostics). Force IPv4 resolution for the npm registry to dodge
# the IPv6 path entirely. Tracked upstream at oven-sh/bun#30325.
env:
  BUN_VERSION: 1.3.12

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Force IPv4 for npm registry
        run: |
          getent ahostsv4 registry.npmjs.org | awk '{print $1; exit}' \
            | xargs -I{} sudo bash -c 'echo "{} registry.npmjs.org" >> /etc/hosts'
          cat /etc/hosts | tail -2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Run format check
        run: bun run format:check

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Force IPv4 for npm registry
        run: |
          getent ahostsv4 registry.npmjs.org | awk '{print $1; exit}' \
            | xargs -I{} sudo bash -c 'echo "{} registry.npmjs.org" >> /etc/hosts'
          cat /etc/hosts | tail -2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Force IPv4 for npm registry
        run: |
          getent ahostsv4 registry.npmjs.org | awk '{print $1; exit}' \
            | xargs -I{} sudo bash -c 'echo "{} registry.npmjs.org" >> /etc/hosts'
          cat /etc/hosts | tail -2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

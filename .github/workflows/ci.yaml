name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Bun 1.3.13 / 1.3.14 introduced a regression in `bun install` that opens
# zero-byte sockets to the npm registry from GitHub Actions runners
# (FailedToOpenSocket / ConnectionRefused). curl to the same registry works
# fine on the same runner, so this is purely a Bun installer bug. Pinning
# to 1.3.12 until the upstream regression (oven-sh/bun#30325) is fixed.
env:
  BUN_VERSION: 1.3.12

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Run format check
        run: bun run format:check

  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
